<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dải màu Neon chuyển sắc chủ đạo của AirDeck -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="lens-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <!-- Bộ lọc phát sáng Neon tạo chiều sâu -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Nền tối tròn bo góc tinh tế -->
  <rect width="512" height="512" rx="120" fill="#0b0d12" />

  <!-- Dải ảnh phía sau (Hiệu ứng cặp dải ảnh in ra từ Photobooth) -->
  <g transform="rotate(10, 256, 256)" opacity="0.25">
    <rect x="191" y="56" width="130" height="400" rx="16" fill="#141821" stroke="url(#brand-grad)" stroke-width="4" />
    <rect x="201" y="66" width="110" height="84" rx="8" fill="#0b0d12" />
    <rect x="201" y="158" width="110" height="84" rx="8" fill="#0b0d12" />
    <rect x="201" y="250" width="110" height="84" rx="8" fill="#0b0d12" />
    <rect x="201" y="342" width="110" height="84" rx="8" fill="#0b0d12" />
  </g>

  <!-- Dải ảnh chính phía trước (Main Tilted Photobooth Strip) -->
  <g transform="rotate(-6, 256, 256)">
    <!-- Thân dải ảnh phát sáng -->
    <rect x="191" y="56" width="130" height="400" rx="16" fill="#141821" stroke="url(#brand-grad)" stroke-width="5" filter="url(#neon-glow)" />

    <!-- Khung 1: Ảnh chụp cười dễ thương (Smile Portrait) -->
    <g transform="translate(201, 66)">
      <rect width="110" height="84" rx="8" fill="#0b0d12" stroke="url(#brand-grad)" stroke-width="1.5" />
      <circle cx="55" cy="42" r="20" fill="none" stroke="#5eead4" stroke-width="3" />
      <path d="M 47 37 A 1.5 1.5 0 1 1 47 36 Z" fill="#5eead4" stroke="#5eead4" stroke-width="1.5" />
      <path d="M 63 37 A 1.5 1.5 0 1 1 63 36 Z" fill="#5eead4" stroke="#5eead4" stroke-width="1.5" />
      <path d="M 46 47 Q 55 56 64 47" fill="none" stroke="#5eead4" stroke-width="2.5" stroke-linecap="round" />
    </g>

    <!-- Khung 2: Ống kính máy ảnh chụp hình (Photobooth Camera) -->
    <g transform="translate(201, 158)">
      <rect width="110" height="84" rx="8" fill="#0b0d12" stroke="url(#brand-grad)" stroke-width="1.5" />
      <rect x="25" y="22" width="60" height="40" rx="6" fill="none" stroke="#a78bfa" stroke-width="3" />
      <path d="M 40 22 L 45 16 L 65 16 L 70 22 Z" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linejoin="round" />
      <circle cx="55" cy="42" r="14" fill="none" stroke="#a78bfa" stroke-width="3" />
      <circle cx="55" cy="42" r="6" fill="#a78bfa" />
      <circle cx="74" cy="30" r="3" fill="#5eead4" />
    </g>

    <!-- Khung 3: Tạo dáng chụp ảnh hình trái tim (Heart Pose) -->
    <g transform="translate(201, 250)">
      <rect width="110" height="84" rx="8" fill="#0b0d12" stroke="url(#brand-grad)" stroke-width="1.5" />
      <path d="M 55 58 C 55 58 32 42 32 30 C 32 19 41 14 48 14 C 52 14 55 18 55 18 C 55 18 58 14 62 14 C 69 14 78 19 78 30 C 78 42 55 58 55 58 Z" fill="none" stroke="#5eead4" stroke-width="4" stroke-linejoin="round" />
    </g>

    <!-- Khung 4: Cử chỉ tay ✌️ nhận diện không chạm (Gesture & CV Tracking) -->
    <g transform="translate(201, 342)">
      <rect width="110" height="84" rx="8" fill="#0b0d12" stroke="url(#brand-grad)" stroke-width="1.5" />
      <!-- Bàn tay cử chỉ ✌️ hữu cơ phát sáng -->
      <g transform="translate(37, 10) scale(0.6)" filter="url(#neon-glow)">
        <path d="M 40 90 C 25 90, 20 70, 20 55 C 20 45, 10 40, 15 30 C 20 20, 32 25, 38 38 L 38 12 C 38 4, 48 4, 48 12 L 48 42 L 48 15 C 48 7, 58 7, 58 15 L 58 50 C 62 50, 72 52, 72 62 C 72 70, 62 70, 62 62 M 62 62 C 64 62, 74 65, 74 72 C 74 80, 62 80, 50 85 L 40 90" 
              fill="url(#brand-grad)" fill-opacity="0.15" 
              stroke="url(#brand-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="43" y1="12" x2="53" y2="15" stroke="#ffffff" stroke-width="2" stroke-dasharray="2 3" opacity="0.7" />
        <circle cx="43" cy="12" r="4" fill="#ffffff" />
        <circle cx="53" cy="15" r="4" fill="#ffffff" />
        <circle cx="15" cy="30" r="3.5" fill="#5eead4" />
      </g>
    </g>

    <!-- Tên thương hiệu in ở đáy dải ảnh giống thực tế (Bottom Strip Label) -->
    <text x="256" y="444" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="11" letter-spacing="4" fill="url(#brand-grad)" text-anchor="middle" opacity="0.8">AIRDECK</text>
  </g>

  <!-- Các ngôi sao lấp lánh trang trí -->
  <path d="M 110 180 L 113 186 L 120 189 L 113 192 L 110 198 L 107 192 L 100 189 L 107 186 Z" fill="#5eead4" filter="url(#neon-glow)" />
  <path d="M 390 300 L 392 304 L 397 306 L 392 308 L 390 312 L 388 308 L 383 306 L 388 304 Z" fill="#a78bfa" filter="url(#neon-glow)" />
</svg>
