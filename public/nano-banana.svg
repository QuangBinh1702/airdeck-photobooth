<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dải màu thân chuối (Vàng Neon -> Xanh Ngọc -> Tím) -->
    <linearGradient id="banana-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" />
      <stop offset="60%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <!-- Dải màu kính bảo hộ Cyber Visor (Hồng Neon -> Tím) -->
    <linearGradient id="visor-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <!-- Hiệu ứng phát sáng Neon -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Nền tối tròn bo góc tinh tế để làm nổi bật màu Neon -->
  <rect width="512" height="512" rx="120" fill="#0b0d12" />

  <!-- Vòng tròn định vị camera (Holographic tracking rings) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#5eead4" stroke-width="2" stroke-dasharray="10 15" opacity="0.3" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5 10" opacity="0.2" />

  <!-- Thân chuối phát sáng chuyển sắc Gen Z -->
  <path d="M 330 110 
           C 210 160, 150 260, 180 390 
           C 185 410, 195 410, 205 395 
           C 220 370, 230 330, 280 270 
           C 330 210, 375 180, 385 145 
           C 390 130, 380 120, 360 115 
           Z" 
        fill="url(#banana-grad)" 
        filter="url(#neon-glow)" />

  <!-- Cuống chuối -->
  <path d="M 330 110 Q 320 95 305 100 Q 315 115 330 110 Z" fill="#4b3f02" />
  <path d="M 180 390 Q 170 410 165 415 Q 180 405 180 390 Z" fill="#4b3f02" />

  <!-- Kính bảo hộ Cyber Visor Gen Z -->
  <polygon points="215,210 325,170 335,200 225,240" fill="url(#visor-grad)" filter="url(#neon-glow)" opacity="0.9" />
  <line x1="230" y1="210" x2="310" y2="180" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6" />

  <!-- Ngôi sao lấp lánh Gen Z Sparkles -->
  <path d="M 400 220 Q 400 250 420 250 Q 400 250 400 280 Q 400 250 380 250 Q 400 250 400 220 Z" fill="#ffe600" filter="url(#neon-glow)" />
  <path d="M 140 140 Q 140 160 150 160 Q 140 160 140 180 Q 140 160 130 160 Q 140 160 140 140 Z" fill="#a78bfa" filter="url(#neon-glow)" />
</svg>
