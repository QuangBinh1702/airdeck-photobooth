<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dải màu Neon chuyển sắc của AirDeck -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <!-- Bộ lọc phát sáng Neon -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Nền tối tròn bo góc tinh tế phù hợp với hệ thống -->
  <rect width="512" height="512" rx="120" fill="#0b0d12" />

  <!-- Khung ngắm camera (Dashed view bounding box) -->
  <rect x="64" y="64" width="384" height="384" rx="96" fill="none" stroke="url(#glow-grad)" stroke-width="2" stroke-dasharray="12 16" opacity="0.25" />

  <!-- Vòng khẩu độ ống kính camera bên ngoài (Camera Lens) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#glow-grad)" stroke-width="8" opacity="0.8" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#glow-grad)" stroke-width="2" stroke-dasharray="6 12" opacity="0.4" />

  <!-- Khung lưới khớp tay cử chỉ - Phong cách MediaPipe Computer Vision Tracking -->
  <g stroke="url(#glow-grad)" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- Các đường nối giữa các khớp (Bàn tay cử chỉ ✌️) -->
    <path d="M 256 370 L 210 320 L 190 280 L 220 270 L 210 160" stroke-width="4" fill="none" /> <!-- Xương ngón trỏ (duỗi thẳng) -->
    <path d="M 256 370 L 270 320 L 260 260 L 270 140" stroke-width="4" fill="none" /> <!-- Xương ngón giữa (duỗi thẳng) -->
    <path d="M 270 320 L 305 325 L 300 280" stroke-width="4" fill="none" /> <!-- Ngón áp út (gập lại) -->
    <path d="M 305 325 L 335 335 L 330 295" stroke-width="4" fill="none" /> <!-- Ngón út (gập lại) -->
    <path d="M 210 320 L 165 330 L 155 300 L 190 280" stroke-width="4" fill="none" /> <!-- Ngón cái -->
    
    <!-- Các khớp cử chỉ dạng điểm tròn phát sáng (Nodes) -->
    <circle cx="256" cy="370" r="8" fill="#a78bfa" filter="url(#neon-glow)" /> <!-- Khớp cổ tay -->
    <circle cx="210" cy="320" r="6" fill="#8b5cf6" />
    <circle cx="165" cy="330" r="6" fill="#5eead4" />
    <circle cx="155" cy="300" r="8" fill="#5eead4" filter="url(#neon-glow)" /> <!-- Đầu ngón cái -->
    
    <circle cx="190" cy="280" r="6" fill="#8b5cf6" />
    <circle cx="220" cy="270" r="6" fill="#8b5cf6" />
    <circle cx="210" cy="160" r="10" fill="#5eead4" filter="url(#neon-glow)" /> <!-- Đầu ngón trỏ -->
    
    <circle cx="270" cy="320" r="6" fill="#8b5cf6" />
    <circle cx="260" cy="260" r="6" fill="#8b5cf6" />
    <circle cx="270" cy="140" r="10" fill="#5eead4" filter="url(#neon-glow)" /> <!-- Đầu ngón giữa -->
    
    <circle cx="300" cy="280" r="6" fill="#8b5cf6" />
    <circle cx="330" cy="295" r="6" fill="#8b5cf6" />
  </g>

  <!-- Đèn Flash camera phát sáng lấp lánh (Sparkle) -->
  <path d="M 360 152 L 364 162 L 374 166 L 364 170 L 360 180 L 356 170 L 346 166 L 356 162 Z" fill="#5eead4" filter="url(#neon-glow)" />
  <circle cx="360" cy="166" r="4" fill="#ffffff" />
</svg>
